<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Car Rental System</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">🚗 Smart Car Rental</div>
  <div class="nav-links">
    <button onclick="showSection('cars')" class="nav-btn active" id="nav-cars">View Cars</button>
    <button onclick="showSection('register')" class="nav-btn" id="nav-register">Register</button>
    <button onclick="showSection('rent')" class="nav-btn" id="nav-rent">Rent Car</button>
    <button onclick="showSection('return')" class="nav-btn" id="nav-return">Return Car</button>
    <button onclick="showSection('admin')" class="nav-btn admin-btn" id="nav-admin">Admin Panel</button>
  </div>
</nav>

<main class="container">

  <!-- CARS SECTION -->
  <section id="section-cars" class="section active">
    <h2>Available Cars</h2>
    <div id="cars-grid" class="cars-grid"></div>
  </section>

  <!-- REGISTER SECTION -->
  <section id="section-register" class="section">
    <h2>Register Customer</h2>
    <div class="form-card">
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="reg-phone" placeholder="Enter phone number">
      </div>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="Enter your name">
      </div>
      <div class="form-group">
        <label>License Number</label>
        <input type="text" id="reg-license" placeholder="Enter license number">
      </div>
      <button class="btn btn-primary" onclick="registerCustomer()">Register</button>
      <div id="reg-msg" class="msg"></div>
    </div>
  </section>

  <!-- RENT SECTION -->
  <section id="section-rent" class="section">
    <h2>Rent a Car</h2>
    <div class="form-card">
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" id="rent-name" placeholder="Enter your name">
      </div>
      <div class="form-group">
        <label>Select Car</label>
        <select id="rent-car"></select>
      </div>
      <div class="form-group">
        <label>Number of Days</label>
        <input type="number" id="rent-days" min="1" value="1">
      </div>
      <div class="form-group">
        <label>Coupon Code (optional)</label>
        <input type="text" id="rent-coupon" placeholder="e.g. SAVE10">
      </div>
      <div class="form-group">
        <label>Payment Method</label>
        <div class="payment-options">
          <label class="radio-label"><input type="radio" name="payment" value="Cash" checked> Cash</label>
          <label class="radio-label"><input type="radio" name="payment" value="UPI"> UPI</label>
          <label class="radio-label"><input type="radio" name="payment" value="Card"> Card</label>
        </div>
      </div>
      <div id="upi-field" class="form-group hidden">
        <label>UPI ID</label>
        <input type="text" id="rent-upi" placeholder="yourname@upi">
      </div>
      <div id="card-field" class="form-group hidden">
        <label>16-digit Card Number</label>
        <input type="text" id="rent-card" placeholder="XXXX XXXX XXXX XXXX" maxlength="19">
      </div>
      <div id="bill-preview" class="bill-preview hidden"></div>
      <button class="btn btn-primary" onclick="previewBill()">Preview Bill</button>
      <button class="btn btn-success hidden" id="confirm-btn" onclick="confirmBooking()">Confirm & Pay</button>
      <div id="rent-msg" class="msg"></div>
    </div>
    <!-- Receipt -->
    <div id="receipt" class="receipt hidden"></div>
  </section>

  <!-- RETURN SECTION -->
  <section id="section-return" class="section">
    <h2>Return a Car</h2>
    <div class="form-card">
      <div class="form-group">
        <label>Select Rented Car</label>
        <select id="return-car"></select>
      </div>
      <div class="form-group">
        <label>Late Days (0 if on time)</label>
        <input type="number" id="late-days" min="0" value="0">
      </div>
      <button class="btn btn-primary" onclick="returnCar()">Return Car</button>
      <div id="return-msg" class="msg"></div>
    </div>
  </section>

  <!-- ADMIN SECTION -->
  <section id="section-admin" class="section">
    <div id="admin-login-box" class="form-card">
      <h3>Admin Login</h3>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="admin-pass" placeholder="Enter admin password">
      </div>
      <button class="btn btn-primary" onclick="adminLogin()">Login</button>
      <div id="admin-login-msg" class="msg"></div>
    </div>

    <div id="admin-panel" class="hidden">
      <div class="admin-header">
        <h2>Admin Panel</h2>
        <button class="btn btn-danger" onclick="adminLogout()">Logout</button>
      </div>

      <div class="stats-grid" id="admin-stats"></div>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('bookings')">Bookings</button>
        <button class="tab-btn" onclick="switchTab('cars-status')">Cars Status</button>
        <button class="tab-btn" onclick="switchTab('users')">Registered Users</button>
      </div>

      <div id="tab-bookings" class="tab-content active"></div>
      <div id="tab-cars-status" class="tab-content hidden"></div>
      <div id="tab-users" class="tab-content hidden"></div>
    </div>
  </section>

</main>

<div id="toast" class="toast hidden"></div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
