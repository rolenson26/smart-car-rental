{% extends "base.html" %}
{% block content %}

<div class="cars-container">

{% for booking in bookings %}

<div class="car-card">

    <h2>
        Booking #{{ booking.booking_id }}
    </h2>

    <p>
        Car ID: {{ booking.car_id }}
    </p>

    <p>
        Status: {{ booking.status }}
    </p>

    <button onclick="updateStatus({{ booking.booking_id }}, 'Approved')">
        Approve
    </button>

    <button onclick="updateStatus({{ booking.booking_id }}, 'Rejected')">
        Reject
    </button>

</div>

{% endfor %}

</div>

<script>
async function updateStatus(
    bookingId,
    status
){
    const response =
    await fetch(
        "/api/bookings/update-status/" +
        bookingId,
        {
            method:"PUT",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                status:status
            })
        }
    )

    const data =
    await response.json()

    alert(data.message)

    location.reload()
}
</script>

{% endblock %}
