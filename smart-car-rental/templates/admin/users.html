{% extends "base.html" %}
{% block title %}User Management | Smart Car Rental{% endblock %}
{% block content %}
<section class="container py-4">
    <h1 class="h2 fw-bold mb-4">User management</h1>
    <div class="table-responsive app-table">
        <table class="table align-middle mb-0">
            <thead><tr><th>User</th><th>Email</th><th>Role</th><th>Joined</th><th></th></tr></thead>
            <tbody>
            {% for user in users %}
                <tr>
                    <td>{{ user.name }}</td>
                    <td>{{ user.email }}</td>
                    <td><span class="badge text-bg-secondary">{{ user.role }}</span></td>
                    <td>{{ user.created_at.strftime("%Y-%m-%d") }}</td>
                    <td class="text-end">
                        <form method="post" action="{{ url_for('admin.update_user_role', user_id=user.id) }}" class="d-inline-flex gap-2">
                            <select class="form-select form-select-sm" name="role">
                                <option value="user" {% if user.role == "user" %}selected{% endif %}>user</option>
                                <option value="admin" {% if user.role == "admin" %}selected{% endif %}>admin</option>
                            </select>
                            <button class="btn btn-outline-primary btn-sm" type="submit">Save</button>
                        </form>
                    </td>
                </tr>
            {% endfor %}
            </tbody>
        </table>
    </div>
</section>
{% endblock %}
