{% extends "base.html" %}
{% block title %}Register | Smart Car Rental{% endblock %}
{% block content %}
<section class="container py-5">
    <div class="auth-card mx-auto">
        <h1 class="h3 fw-bold mb-4">Create your account</h1>
        <form method="post" class="vstack gap-3">
            <div>
                <label class="form-label" for="name">Full name</label>
                <input class="form-control" id="name" type="text" name="name" required>
            </div>
            <div>
                <label class="form-label" for="email">Email</label>
                <input class="form-control" id="email" type="email" name="email" required>
            </div>
            <div>
                <label class="form-label" for="phone">Phone</label>
                <input class="form-control" id="phone" type="tel" name="phone">
            </div>
            <div>
                <label class="form-label" for="password">Password</label>
                <input class="form-control" id="password" type="password" name="password" minlength="6" required>
            </div>
            <button class="btn btn-primary w-100" type="submit">Register</button>
        </form>
    </div>
</section>
{% endblock %}
