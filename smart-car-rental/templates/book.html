{% extends "base.html" %}

{% block content %}

<div class="form-container">

    <h2>Book Car</h2>

    <p>Car ID: {{ car_id }}</p>

    <input
        type="date"
        id="start_date"
    >

    <input
        type="date"
        id="end_date"
    >

    <button id="bookBtn">
        Confirm Booking
    </button>

</div>

<script>

document.getElementById(
    "bookBtn"
).addEventListener(
    "click",
    async function(){
        alert("BEFORE FETCH")
        const response =
        await fetch(
            "/api/bookings/add",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    
                    car_id:{{ car_id }},
                    start_date:
                    document.getElementById(
                        "start_date"
                    ).value,
                    end_date:
                    document.getElementById(
                        "end_date"
                    ).value
                })
            }
        )
        alert("AFTER FETCH")

        const data =
        await response.json()
        console.log(data)
        alert(
            data.message
        )

    }
)

</script>

{% endblock %}
