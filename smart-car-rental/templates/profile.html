{% extends "base.html" %}
{% block title %}Profile | Smart Car Rental{% endblock %}
{% block content %}
<section class="container py-5">
    <div class="profile-panel">
        <h1 class="h3 fw-bold">User profile</h1>
        <dl class="row mb-0 mt-3">
            <dt class="col-sm-3">Name</dt><dd class="col-sm-9">{{ user.name }}</dd>
            <dt class="col-sm-3">Email</dt><dd class="col-sm-9">{{ user.email }}</dd>
            <dt class="col-sm-3">Phone</dt><dd class="col-sm-9">{{ user.phone or "Not provided" }}</dd>
            <dt class="col-sm-3">Role</dt><dd class="col-sm-9">{{ user.role|title }}</dd>
            <dt class="col-sm-3">Joined</dt><dd class="col-sm-9">{{ user.created_at.strftime("%Y-%m-%d") }}</dd>
        </dl>
    </div>
</section>
{% endblock %}
